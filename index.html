<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>📷 連続JANコードスキャナー</title>
  <style>
    :root {
      --primary: #0ea5e9;
      --primary-hover: #0284c7;
      --success: #10b981;
      --danger: #ef4444;
      --bg-dark: #0f172a;
      --card-dark: #1e293b;
      --text-light: #f8fafc;
    }
    
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-dark);
      color: var(--text-light);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    
    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      padding: 12px;
      box-sizing: border-box;
      height: 100vh;
    }
    
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin: 4px 0 10px 0;
    }
    
    h1 {
      font-size: 16px;
      margin: 0;
      color: var(--primary);
      font-weight: 800;
      letter-spacing: 0.05em;
    }
    
    #btn-switch-camera {
      background: var(--primary);
      color: var(--text-light);
      border: none;
      padding: 6px 12px;
      font-size: 11.5px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      display: none; /* カメラが複数ある時だけ表示 */
      transition: background 0.1s;
      box-shadow: 0 2px 4px rgba(14, 165, 233, 0.3);
    }
    #btn-switch-camera:hover {
      background: var(--primary-hover);
    }
    
    #scanner-container {
      width: 100%;
      position: relative;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      border: 2px solid #334155;
    }
    
    #reader {
      width: 100%;
    }
    
    /* レーザー風のスキャンアニメーション */
    .scan-laser {
      position: absolute;
      top: 10%;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--danger);
      box-shadow: 0 0 8px var(--danger);
      animation: scan 2s linear infinite;
      z-index: 10;
      pointer-events: none;
    }
    
    @keyframes scan {
      0% { top: 15%; }
      50% { top: 85%; }
      100% { top: 15%; }
    }
    
    #status {
      margin: 6px 0;
      font-size: 12.5px;
      font-weight: bold;
      color: #94a3b8;
      text-align: center;
      min-height: 18px;
    }
    
    /* 🔎 ズームコントロールパネル */
    #zoom-container {
      background: var(--card-dark);
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 10px;
      display: none;
      flex-direction: column;
      gap: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    
    .zoom-slider-row {
      display: flex;
      align-items: center;
      width: 100%;
      gap: 12px;
    }
    
    .zoom-label {
      font-size: 11px;
      font-weight: bold;
      color: #94a3b8;
      white-space: nowrap;
    }
    
    .zoom-slider {
      flex: 1;
      accent-color: var(--primary);
      height: 6px;
      border-radius: 3px;
      outline: none;
      background: #475569;
    }
    
    .zoom-btn-row {
      display: flex;
      gap: 6px;
      justify-content: center;
      width: 100%;
    }
    
    .zoom-btn {
      background: #334155;
      color: var(--text-light);
      border: 1px solid #475569;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      transition: 0.1s;
    }
    .zoom-btn:hover {
      background: #475569;
    }
    .zoom-btn.active {
      background: var(--primary);
      border-color: var(--primary);
    }
    
    /* スキャンされたリストエリア */
    .list-title {
      font-size: 13px;
      font-weight: bold;
      color: #94a3b8;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    
    .scan-list-box {
      flex: 1;
      background: var(--card-dark);
      border-radius: 8px;
      border: 1px solid #334155;
      padding: 8px;
      overflow-y: auto;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 100px;
    }
    
    .scan-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #273549;
      padding: 6px 10px;
      border-radius: 6px;
      animation: slideIn 0.2s ease-out;
      font-size: 13.5px;
      font-weight: bold;
    }
    
    @keyframes slideIn {
      from { transform: translateY(-5px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    .scan-item-jan {
      font-family: monospace;
      letter-spacing: 0.05em;
    }
    
    .delete-item-btn {
      background: none;
      border: none;
      color: var(--danger);
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      margin-left: 8px;
    }
    
    /* アクションボタンエリア */
    .button-group {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 10px;
      margin-bottom: 8px;
    }
    
    .btn {
      padding: 12px 10px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    
    .btn-secondary {
      background: #475569;
      color: #fff;
    }
    .btn-secondary:hover {
      background: #334155;
    }
    
    .btn-primary {
      background: var(--success);
      color: #fff;
      font-size: 14.5px;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }
    .btn-primary:hover {
      background: #059669;
      transform: translateY(-1px);
    }
    
    .empty-message {
      color: #64748b;
      text-align: center;
      margin: auto;
      font-size: 12px;
      font-weight: 500;
    }
  </style>
  <script src="https://unpkg.com/html5-qrcode"></script>
</head>
<body>
  <div class="container">
    <div class="header-row">
      <h1>📷 連続JANコードスキャナー</h1>
      <button id="btn-switch-camera" onclick="switchCamera()">🔄 カメラ切替</button>
    </div>
    
    <div id="scanner-container">
      <div id="reader"></div>
      <div class="scan-laser"></div>
    </div>
    
    <div id="status">カメラを起動しています...</div>
    
    <!-- 🔍 ズーム操作用パネル -->
    <div id="zoom-container">
      <div class="zoom-slider-row">
        <span class="zoom-label">🔎 ズーム: <span id="zoom-val-label">1.0</span>x</span>
        <input type="range" id="zoom-slider" class="zoom-slider" step="0.1" value="1">
      </div>
      <div class="zoom-btn-row">
        <button class="zoom-btn active" id="z-btn-1" onclick="setZoomPreset(1.0)">1.0x</button>
        <button class="zoom-btn" id="z-btn-15" onclick="setZoomPreset(1.5)">1.5x</button>
        <button class="zoom-btn" id="z-btn-2" onclick="setZoomPreset(2.0)">2.0x</button>
        <button class="zoom-btn" id="z-btn-25" onclick="setZoomPreset(2.5)">2.5x</button>
      </div>
    </div>
    
    <div class="list-title">
      <span>📋 スキャンしたJAN一覧 (<span id="scan-count">0</span>件)</span>
      <button onclick="clearHistory()" style="background:none; border:none; color:#94a3b8; font-size:11px; cursor:pointer; text-decoration:underline;">すべてクリア</button>
    </div>
    
    <div class="scan-list-box" id="scan-list-container">
      <div class="empty-message" id="empty-hint">バーコードを読み取るとここにリスト化されます。</div>
    </div>
    
    <div class="button-group">
      <button class="btn btn-secondary" onclick="window.close()">キャンセル</button>
      <button class="btn btn-primary" id="btn-submit" onclick="submitToGas()">
        <span>📤 GASに送信して閉じる</span>
      </button>
    </div>
  </div>

  <script>
    let scannedJans = [];
    let html5Qrcode = null;
    let lastScannedJan = "";
    let lastScanTime = 0;
    const DEBOUNCE_TIME = 2000; // 同一JANコードの連続読み取りを防ぐロック時間 (2秒)
    
    let activeTrack = null; // ズーム制御用
    let cameraDevices = []; // 利用可能なカメラ一覧
    let currentCameraIndex = 0; // 現在のカメラインデックス

    const playBeep = (type = 'success') => {
      try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        if (type === 'success') {
          oscillator.type = 'sine';
          oscillator.frequency.value = 1000;
          gainNode.gain.setValueAtTime(0.08, audioCtx.currentTime);
          oscillator.start();
          oscillator.stop(audioCtx.currentTime + 0.12);
        } else {
          oscillator.type = 'triangle';
          oscillator.frequency.value = 300;
          gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
          oscillator.start();
          oscillator.stop(audioCtx.currentTime + 0.2);
        }
      } catch (e) {
        console.error(e);
      }
    };

    function addJan(jan) {
      const now = Date.now();
      
      if (jan === lastScannedJan && (now - lastScanTime) < DEBOUNCE_TIME) {
        return;
      }
      
      lastScannedJan = jan;
      lastScanTime = now;
      
      if (scannedJans.includes(jan)) {
        playBeep('duplicate');
        document.getElementById('status').innerText = "⚠️ すでに追加されています: " + jan;
        return;
      }
      
      scannedJans.push(jan);
      playBeep('success');
      document.getElementById('status').innerText = "✅ スキャン成功: " + jan;
      
      renderList();
    }

    function removeJan(index) {
      scannedJans.splice(index, 1);
      renderList();
      document.getElementById('status').innerText = "項目を削除しました。";
    }

    function clearHistory() {
      if (scannedJans.length === 0) return;
      if (!confirm("全てクリアしますか？")) return;
      scannedJans = [];
      lastScannedJan = "";
      renderList();
      document.getElementById('status').innerText = "履歴をすべてクリアしました。";
    }

    function renderList() {
      const container = document.getElementById('scan-list-container');
      const countLabel = document.getElementById('scan-count');
      
      countLabel.innerText = scannedJans.length;
      
      if (scannedJans.length === 0) {
        container.innerHTML = '<div class="empty-message" id="empty-hint">バーコードを読み取るとここにリスト化されます。</div>';
        return;
      }
      
      let html = "";
      scannedJans.forEach((jan, idx) => {
        html += `
          <div class="scan-item">
            <span class="scan-item-jan">🏷️ ${jan}</span>
            <button class="delete-item-btn" onclick="removeJan(${idx})">×</button>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    function submitToGas() {
      if (scannedJans.length === 0) {
        alert("まだ何もスキャンされていません。");
        return;
      }
      
      if (window.opener) {
        const payload = scannedJans.join(" ");
        window.opener.postMessage(payload, "*");
        document.getElementById('status').innerText = "📤 GAS画面へ送信中...";
        setTimeout(() => {
          window.close();
        }, 150);
      } else {
        alert("送信先（親画面）が見つかりません。直接JANコードをコピーしてください：\n\n" + scannedJans.join(" "));
      }
    }

    // 🔍 ズーム制御関連JS
    function setupZoomSupport(scannerInstance) {
      try {
        if (typeof scannerInstance.getActiveTrack !== 'function') return;
        activeTrack = scannerInstance.getActiveTrack();
        if (!activeTrack) return;
        
        const capabilities = activeTrack.getCapabilities();
        if (capabilities.zoom) {
          document.getElementById('zoom-container').style.display = 'flex';
          
          const minZoom = capabilities.zoom.min || 1;
          const maxZoom = capabilities.zoom.max || 3;
          const step = capabilities.zoom.step || 0.1;
          
          const slider = document.getElementById('zoom-slider');
          slider.min = minZoom;
          slider.max = maxZoom;
          slider.step = step;
          
          // iOS Safariや高性能カメラでのピント調節対策として、初期ズームを1.5倍（またはサポート範囲内の値）に設定
          const defaultZoom = Math.min(Math.max(minZoom, 1.5), maxZoom);
          slider.value = defaultZoom;
          applyZoom(defaultZoom);
          
          slider.oninput = (e) => {
            const val = parseFloat(e.target.value);
            applyZoom(val);
          };
        } else {
          document.getElementById('zoom-container').style.display = 'none';
        }
      } catch(e) {
        console.warn("ズーム機能セットアップ失敗: ", e);
      }
    }

    function applyZoom(value) {
      if (!activeTrack) return;
      document.getElementById('zoom-val-label').innerText = value.toFixed(1);
      
      document.querySelectorAll('.zoom-btn').forEach(btn => btn.classList.remove('active'));
      if (value === 1.0) document.getElementById('z-btn-1').classList.add('active');
      else if (value === 1.5) document.getElementById('z-btn-15').classList.add('active');
      else if (value === 2.0) document.getElementById('z-btn-2').classList.add('active');
      else if (value === 2.5) document.getElementById('z-btn-25').classList.add('active');

      activeTrack.applyConstraints({
        advanced: [{ zoom: value }]
      }).catch(err => console.error("ズーム適用失敗: ", err));
    }

    function setZoomPreset(value) {
      const slider = document.getElementById('zoom-slider');
      if (slider) {
        const min = parseFloat(slider.min) || 1;
        const max = parseFloat(slider.max) || 3;
        const targetValue = Math.max(min, Math.min(max, value));
        slider.value = targetValue;
        applyZoom(targetValue);
      }
    }

    // 🔄 カメラ切り替えロジック
    function switchCamera() {
      if (cameraDevices.length <= 1) return;
      
      currentCameraIndex = (currentCameraIndex + 1) % cameraDevices.length;
      document.getElementById('status').innerText = "カメラを切り替えています...";
      
      if (html5Qrcode) {
        html5Qrcode.stop().then(() => {
          const nextId = cameraDevices[currentCameraIndex].id;
          const config = {
            fps: 15,
            qrbox: (width, height) => {
              const w = Math.min(width * 0.85, 360);
              const h = Math.min(height * 0.35, 120);
              return { width: w, height: h };
            },
            formatsToSupport: [
              Html5QrcodeSupportedFormats.EAN_13,
              Html5QrcodeSupportedFormats.EAN_8
            ],
            experimentalFeatures: {
              useBarCodeDetectorIfSupported: false
            }
          };
          
          html5Qrcode.start(
            nextId,
            config,
            (decodedText) => addJan(decodedText),
            (error) => {}
          ).then(() => {
            document.getElementById('status').innerText = "カメラを切り替えました。枠に合わせてください。";
            setupZoomSupport(html5Qrcode);
          }).catch(err => {
            document.getElementById('status').innerText = "カメラ起動エラー: " + err;
          });
        }).catch(err => {
          console.error("カメラ停止エラー: ", err);
        });
      }
    }

    function startScan() {
      html5Qrcode = new Html5Qrcode("reader");
      
      const config = {
        fps: 15,
        qrbox: (width, height) => {
          const w = Math.min(width * 0.85, 360);
          const h = Math.min(height * 0.35, 120);
          return { width: w, height: h };
        },
        formatsToSupport: [
          Html5QrcodeSupportedFormats.EAN_13,
          Html5QrcodeSupportedFormats.EAN_8
        ],
        experimentalFeatures: {
          useBarCodeDetectorIfSupported: false
        }
      };

      // 1. デバイス一覧を取得して、初期起動カメラを決定する
      Html5Qrcode.getCameras().then(devices => {
        cameraDevices = devices || [];
        
        if (cameraDevices.length === 0) {
          document.getElementById('status').innerText = "カメラが見つかりませんでした。";
          return;
        }

        // カメラが複数ある場合は切替ボタンを表示
        if (cameraDevices.length > 1) {
          document.getElementById('btn-switch-camera').style.display = 'block';
        }

        // iPhoneのSafari初期インカメラ起動を防ぐため、デフォルトは「配列の最後（通常は背面）」を選択
        // iOS Safariではラベルが空文字になるため、明示的に最後のカメラIDを指定
        currentCameraIndex = cameraDevices.length - 1;
        let cameraId = cameraDevices[currentCameraIndex].id;

        // もしラベルが取得できていて、背面の文字があればそれを優先して初期値にする
        for (let i = 0; i < cameraDevices.length; i++) {
          const label = (cameraDevices[i].label || "").toLowerCase();
          if (label.indexOf("back") !== -1 || label.indexOf("rear") !== -1 || label.indexOf("背面") !== -1) {
            currentCameraIndex = i;
            cameraId = cameraDevices[i].id;
            break;
          }
        }

        html5Qrcode.start(
          cameraId,
          config,
          (decodedText) => {
            addJan(decodedText);
          },
          (error) => {
            // エラー無視
          }
        ).then(() => {
          document.getElementById('status').innerText = "バーコードを枠に合わせてください。";
          setupZoomSupport(html5Qrcode);
        }).catch(err => {
          console.warn("指定IDでの起動失敗。標準環境起動を試みます...", err);
          // 万が一失敗した場合は、標準の facingMode 起動でフォールバック
          html5Qrcode.start(
            { facingMode: "environment" },
            config,
            (decodedText) => addJan(decodedText),
            (error) => {}
          ).then(() => {
            document.getElementById('status').innerText = "バーコードを枠に合わせてください。";
            setupZoomSupport(html5Qrcode);
          }).catch(err2 => {
            document.getElementById('status').innerText = "カメラ起動エラー: " + err2;
          });
        });
      }).catch(err => {
        document.getElementById('status').innerText = "カメラ取得エラー: " + err;
      });
    }

    window.onload = startScan;
  </script>
</body>
</html>
