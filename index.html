<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>📷 連続JANコードスキャナー</title>
  <style>
    :root {
      --primary: #0ea5e9;
      --primary-hover: #0284c7;
      --success: #10b981;
      --danger: #ef4444;
      --bg-dark: #0f172a;
      --card-dark: #1e293b;
      --text-light: #f8fafc;
    }
    
    body {
      margin: 0;
      padding: 0;
      background-color: var(--bg-dark);
      color: var(--text-light);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      box-sizing: border-box;
    }
    
    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      padding: 12px;
      box-sizing: border-box;
      height: 100vh;
    }
    
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      margin: 4px 0 10px 0;
    }
    
    h1 {
      font-size: 16px;
      margin: 0;
      color: var(--primary);
      font-weight: 800;
      letter-spacing: 0.05em;
    }
    
    #btn-switch-camera {
      background: var(--primary);
      color: var(--text-light);
      border: none;
      padding: 6px 12px;
      font-size: 11.5px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      display: none; /* カメラが複数ある時だけ表示 */
      transition: background 0.1s;
      box-shadow: 0 2px 4px rgba(14, 165, 233, 0.3);
    }
    #btn-switch-camera:hover {
      background: var(--primary-hover);
    }
    
    #scanner-container {
      width: 100%;
      position: relative;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      border: 2px solid #334155;
    }
    
    #reader {
      width: 100%;
      position: relative;
    }
    #reader video, #reader canvas {
      width: 100%;
      height: auto;
      display: block;
    }
    #reader canvas.drawingBuffer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    
    /* レーザー風のスキャンアニメーション */
    .scan-laser {
      position: absolute;
      top: 10%;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--danger);
      box-shadow: 0 0 8px var(--danger);
      animation: scan 2s linear infinite;
      z-index: 10;
      pointer-events: none;
    }
    
    @keyframes scan {
      0% { top: 15%; }
      50% { top: 85%; }
      100% { top: 15%; }
    }
    
    #status {
      margin: 6px 0;
      font-size: 12.5px;
      font-weight: bold;
      color: #94a3b8;
      text-align: center;
      min-height: 18px;
    }
    
    /* 🔎 ズームコントロールパネル */
    #zoom-container {
      background: var(--card-dark);
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 8px 12px;
      margin-bottom: 10px;
      display: none;
      flex-direction: column;
      gap: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    
    .zoom-slider-row {
      display: flex;
      align-items: center;
      width: 100%;
      gap: 12px;
    }
    
    .zoom-label {
      font-size: 11px;
      font-weight: bold;
      color: #94a3b8;
      white-space: nowrap;
    }
    
    .zoom-slider {
      flex: 1;
      accent-color: var(--primary);
      height: 6px;
      border-radius: 3px;
      outline: none;
      background: #475569;
    }
    
    .zoom-btn-row {
      display: flex;
      gap: 6px;
      justify-content: center;
      width: 100%;
    }
    
    .zoom-btn {
      background: #334155;
      color: var(--text-light);
      border: 1px solid #475569;
      padding: 4px 12px;
      font-size: 11px;
      font-weight: bold;
      border-radius: 4px;
      cursor: pointer;
      transition: 0.1s;
    }
    .zoom-btn:hover {
      background: #475569;
    }
    .zoom-btn.active {
      background: var(--primary);
      border-color: var(--primary);
    }
    
    /* スキャンされたリストエリア */
    .list-title {
      font-size: 13px;
      font-weight: bold;
      color: #94a3b8;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }
    
    .scan-list-box {
      flex: 1;
      background: var(--card-dark);
      border-radius: 8px;
      border: 1px solid #334155;
      padding: 8px;
      overflow-y: auto;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-height: 100px;
    }
    
    .scan-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #273549;
      padding: 6px 10px;
      border-radius: 6px;
      animation: slideIn 0.2s ease-out;
      font-size: 13.5px;
      font-weight: bold;
    }
    
    @keyframes slideIn {
      from { transform: translateY(-5px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    
    .scan-item-jan {
      font-family: monospace;
      letter-spacing: 0.05em;
    }
    
    .delete-item-btn {
      background: none;
      border: none;
      color: var(--danger);
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
      margin-left: 8px;
    }
    
    /* アクションボタンエリア */
    .button-group {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 10px;
      margin-bottom: 8px;
    }
    
    .btn {
      padding: 12px 10px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      transition: 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    
    .btn-secondary {
      background: #475569;
      color: #fff;
    }
    .btn-secondary:hover {
      background: #334155;
    }
    
    .btn-primary {
      background: var(--success);
      color: #fff;
      font-size: 14.5px;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }
    .btn-primary:hover {
      background: #059669;
      transform: translateY(-1px);
    }
    
    .empty-message {
      color: #64748b;
      text-align: center;
      margin: auto;
      font-size: 12px;
      font-weight: 500;
    }
  </style>
  <!-- 1Dバーコード（EAN/JAN）の読み取りにおいてiOS Safariで抜群の実績を持つQuaggaJSをロード -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
</head>
<body>
  <div class="container">
    <div class="header-row">
      <h1>📷 連続JANコードスキャナー</h1>
      <button id="btn-switch-camera" onclick="switchCamera()">🔄 カメラ切替</button>
    </div>
    
    <div id="scanner-container">
      <div id="reader"></div>
      <div class="scan-laser"></div>
    </div>
    
    <div id="status">カメラを起動しています...</div>
    
    <!-- 🔍 ズーム操作用パネル -->
    <div id="zoom-container">
      <div class="zoom-slider-row">
        <span class="zoom-label">🔎 ズーム: <span id="zoom-val-label">1.0</span>x</span>
        <input type="range" id="zoom-slider" class="zoom-slider" step="0.1" value="1">
      </div>
      <div class="zoom-btn-row">
        <button class="zoom-btn active" id="z-btn-1" onclick="setZoomPreset(1.0)">1.0x</button>
        <button class="zoom-btn" id="z-btn-15" onclick="setZoomPreset(1.5)">1.5x</button>
        <button class="zoom-btn" id="z-btn-2" onclick="setZoomPreset(2.0)">2.0x</button>
        <button class="zoom-btn" id="z-btn-25" onclick="setZoomPreset(2.5)">2.5x</button>
      </div>
    </div>
    
    <div class="list-title">
      <span>📋 スキャンしたJAN一覧 (<span id="scan-count">0</span>件)</span>
      <button onclick="clearHistory()" style="background:none; border:none; color:#94a3b8; font-size:11px; cursor:pointer; text-decoration:underline;">すべてクリア</button>
    </div>
    
    <div class="scan-list-box" id="scan-list-container">
      <div class="empty-message" id="empty-hint">バーコードを読み取るとここにリスト化されます。</div>
    </div>
    
    <div class="button-group">
      <button class="btn btn-secondary" onclick="window.close()">キャンセル</button>
      <button class="btn btn-primary" id="btn-submit" onclick="submitToGas()">
        <span>📤 GASに送信して閉じる</span>
      </button>
    </div>
  </div>

  <script>
    let scannedJans = [];
    let isScanLocked = false;
    const SCAN_LOCK_DURATION = 1500; // スキャン成功後のグローバルロック時間 (1.5秒)
    let lastScannedJan = "";
    
    let activeTrack = null; // ズーム制御用
    let cameraDevices = []; // 利用可能なカメラ一覧
    let currentCameraIndex = 0; // 現在のカメラインデックス
    let isQuaggaRunning = false;

    // iOS SafariでのWeb Audio自動再生制限を解除するためのグローバルContext
    let globalAudioCtx = null;
    const initAudio = () => {
      if (globalAudioCtx) return;
      try {
        globalAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const buffer = globalAudioCtx.createBuffer(1, 1, 22050);
        const source = globalAudioCtx.createBufferSource();
        source.buffer = buffer;
        source.connect(globalAudioCtx.destination);
        source.start(0);
        if (globalAudioCtx.state === 'suspended') {
          globalAudioCtx.resume();
        }
      } catch (e) {
        console.warn("AudioContext初期化エラー: ", e);
      }
    };
    window.addEventListener('touchstart', initAudio, { once: true });
    window.addEventListener('click', initAudio, { once: true });

    const playBeep = (type = 'success') => {
      try {
        if (!globalAudioCtx) {
          globalAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (globalAudioCtx.state === 'suspended') {
          globalAudioCtx.resume();
        }
        
        const oscillator = globalAudioCtx.createOscillator();
        const gainNode = globalAudioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(globalAudioCtx.destination);
        
        if (type === 'success') {
          oscillator.type = 'sine';
          oscillator.frequency.value = 1000;
          gainNode.gain.setValueAtTime(0.08, globalAudioCtx.currentTime);
          oscillator.start();
          oscillator.stop(globalAudioCtx.currentTime + 0.12);
        } else {
          oscillator.type = 'triangle';
          oscillator.frequency.value = 300;
          gainNode.gain.setValueAtTime(0.1, globalAudioCtx.currentTime);
          oscillator.start();
          oscillator.stop(globalAudioCtx.currentTime + 0.2);
        }
      } catch (e) {
        console.error("ビープ音再生エラー: ", e);
      }
    };

    function addJan(jan) {
      if (isScanLocked) return;
      
      // スキャン成功、あるいは重複警告のどちらであっても、チャタリング防止のため即座に1.5秒ロックをかける
      isScanLocked = true;
      setTimeout(() => {
        isScanLocked = false;
      }, SCAN_LOCK_DURATION);
      
      lastScannedJan = jan;
      
      if (scannedJans.includes(jan)) {
        playBeep('duplicate');
        document.getElementById('status').innerText = "⚠️ すでに追加されています: " + jan;
        return;
      }
      
      scannedJans.push(jan);
      playBeep('success');
      document.getElementById('status').innerText = "✅ スキャン成功: " + jan;
      
      renderList();
    }

    function removeJan(index) {
      scannedJans.splice(index, 1);
      renderList();
      document.getElementById('status').innerText = "項目を削除しました。";
    }

    function clearHistory() {
      if (scannedJans.length === 0) return;
      if (!confirm("全てクリアしますか？")) return;
      scannedJans = [];
      lastScannedJan = "";
      renderList();
      document.getElementById('status').innerText = "履歴をすべてクリアしました。";
    }

    function renderList() {
      const container = document.getElementById('scan-list-container');
      const countLabel = document.getElementById('scan-count');
      
      countLabel.innerText = scannedJans.length;
      
      if (scannedJans.length === 0) {
        container.innerHTML = '<div class="empty-message" id="empty-hint">バーコードを読み取るとここにリスト化されます。</div>';
        return;
      }
      
      let html = "";
      scannedJans.forEach((jan, idx) => {
        html += `
          <div class="scan-item">
            <span class="scan-item-jan">🏷️ ${jan}</span>
            <button class="delete-item-btn" onclick="removeJan(${idx})">×</button>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    function submitToGas() {
      if (scannedJans.length === 0) {
        alert("まだ何もスキャンされていません。");
        return;
      }
      
      if (window.opener) {
        const payload = scannedJans.join(" ");
        window.opener.postMessage(payload, "*");
        document.getElementById('status').innerText = "📤 GAS画面へ送信中...";
        setTimeout(() => {
          window.close();
        }, 150);
      } else {
        alert("送信先（親画面）が見つかりません。直接JANコードをコピーしてください：\n\n" + scannedJans.join(" "));
      }
    }

    // 🔍 ズーム制御関連JS
    function setupZoomSupport() {
      try {
        if (typeof Quagga.CameraAccess.getActiveTrack !== 'function') return;
        activeTrack = Quagga.CameraAccess.getActiveTrack();
        if (!activeTrack) return;
        
        const capabilities = activeTrack.getCapabilities();
        if (capabilities.zoom) {
          document.getElementById('zoom-container').style.display = 'flex';
          
          const minZoom = capabilities.zoom.min || 1;
          const maxZoom = capabilities.zoom.max || 3;
          const step = capabilities.zoom.step || 0.1;
          
          const slider = document.getElementById('zoom-slider');
          slider.min = minZoom;
          slider.max = maxZoom;
          slider.step = step;
          
          // iOS Safariや高性能カメラでのピント調節対策として、初期ズームを2.0倍（またはサポート範囲内の値）に設定
          const defaultZoom = Math.min(Math.max(minZoom, 2.0), maxZoom);
          slider.value = defaultZoom;
          applyZoom(defaultZoom);
          
          slider.oninput = (e) => {
            const val = parseFloat(e.target.value);
            applyZoom(val);
          };
        } else {
          document.getElementById('zoom-container').style.display = 'none';
        }
      } catch(e) {
        console.warn("ズーム機能セットアップ失敗: ", e);
      }
    }

    function applyZoom(value) {
      if (!activeTrack) return;
      document.getElementById('zoom-val-label').innerText = value.toFixed(1);
      
      document.querySelectorAll('.zoom-btn').forEach(btn => btn.classList.remove('active'));
      if (value === 1.0) document.getElementById('z-btn-1').classList.add('active');
      else if (value === 1.5) document.getElementById('z-btn-15').classList.add('active');
      else if (value === 2.0) document.getElementById('z-btn-2').classList.add('active');
      else if (value === 2.5) document.getElementById('z-btn-25').classList.add('active');

      activeTrack.applyConstraints({
        advanced: [{ zoom: value }]
      }).catch(err => console.error("ズーム適用失敗: ", err));
    }

    function setZoomPreset(value) {
      const slider = document.getElementById('zoom-slider');
      if (slider) {
        const min = parseFloat(slider.min) || 1;
        const max = parseFloat(slider.max) || 3;
        const targetValue = Math.max(min, Math.min(max, value));
        slider.value = targetValue;
        applyZoom(targetValue);
      }
    }

    // 🔄 カメラ切り替えロジック
    function switchCamera() {
      if (cameraDevices.length <= 1) return;
      
      currentCameraIndex = (currentCameraIndex + 1) % cameraDevices.length;
      document.getElementById('status').innerText = "カメラを切り替えています...";
      
      if (isQuaggaRunning) {
        Quagga.stop();
        isQuaggaRunning = false;
      }
      
      const nextId = cameraDevices[currentCameraIndex].deviceId || cameraDevices[currentCameraIndex].id;
      initQuagga(nextId);
    }

    function initQuagga(deviceId) {
      document.getElementById('status').innerText = "カメラを起動しています...";
      
      const constraints = {
        width: { ideal: 1280 },
        height: { ideal: 720 },
        facingMode: "environment"
      };
      
      if (deviceId) {
        delete constraints.facingMode;
        constraints.deviceId = deviceId;
      }
      
      Quagga.init({
        inputStream: {
          name: "Live",
          type: "LiveStream",
          target: document.querySelector('#reader'),
          constraints: constraints,
          area: { // スキャンエリアを画面中央の細いスリット（高さ30%）に制限し、端の書類などの映り込みを完全遮断
            top: "35%",
            bottom: "35%",
            left: "5%",
            right: "5%"
          }
        },
        decoder: {
          readers: ["ean_reader", "ean_8_reader"] // JANコード専用
        },
        locate: true, // バーコードの領域検知（これでiOSの歪みバグを無効化）
        numOfWorkers: 2
      }, function(err) {
        if (err) {
          document.getElementById('status').innerText = "カメラ起動エラー: " + err;
          isQuaggaRunning = false;
          return;
        }
        
        Quagga.start();
        isQuaggaRunning = true;
        document.getElementById('status').innerText = "バーコードを中央付近に合わせてください。";
        
        // カメラ初期化後に少し時間をおいてからトラックのズームを設定
        setTimeout(setupZoomSupport, 1000);
      });
    }

    function startScan() {
      // 1. 利用可能なカメラデバイス一覧を取得
      Quagga.CameraAccess.enumerateVideoDevices().then(devices => {
        cameraDevices = devices || [];
        
        if (cameraDevices.length === 0) {
          // デバイスが列挙できなくても、フォールバックとして環境起動を試みる
          initQuagga(null);
          return;
        }

        // カメラが複数ある場合は切替ボタンを表示
        if (cameraDevices.length > 1) {
          document.getElementById('btn-switch-camera').style.display = 'block';
        }

        // 初期起動時は環境（背面）を優先するため deviceId = null で起動
        initQuagga(null);
      }).catch(err => {
        console.warn("カメラ一覧の取得に失敗。標準背面カメラでの起動を試みます...", err);
        initQuagga(null);
      });
    }

    let lastDetectedTemp = "";
    let detectedCount = 0;
    const REQUIRED_DETECTIONS = 4; // 誤読防止のため、連続して4回同じコードが検出されたら確定する (本物なら一瞬でクリアされます)

    // バーコードを検出した際のコールバック
    Quagga.onDetected(function(result) {
      if (isScanLocked) return;

      if (result && result.codeResult && result.codeResult.code) {
        const code = result.codeResult.code;
        // 海外製JANコードにも対応するため先頭数字の制限は行わず、
        // EAN-13 / EAN-8 のチェックサム（モジュラス10）検証に合格したもののみを受理します。
        // （書類の文字やノイズは「連続4回一致」の検証によって完璧に除外されます）
        if (isValidEAN(code)) {
          if (code === lastDetectedTemp) {
            detectedCount++;
          } else {
            lastDetectedTemp = code;
            detectedCount = 1;
          }

          if (detectedCount >= REQUIRED_DETECTIONS) {
            addJan(code);
            // 確定したらテンポラリをリセットして連打を防ぐ
            lastDetectedTemp = "";
            detectedCount = 0;
          }
        }
      }
    });

    // EANチェックサム（モジュール10ウェイト3・1）検証
    function isValidEAN(code) {
      if (!/^\d{8}$|^\d{13}$/.test(code)) return false;
      const digits = code.split('').map(Number);
      const checkDigit = digits.pop();
      let sum = 0;
      if (digits.length === 12) { // EAN-13
        for (let i = 0; i < 12; i++) {
          sum += digits[i] * (i % 2 === 0 ? 1 : 3);
        }
      } else if (digits.length === 7) { // EAN-8
        for (let i = 0; i < 7; i++) {
          sum += digits[i] * (i % 2 === 0 ? 3 : 1);
        }
      }
      const calculated = (10 - (sum % 10)) % 10;
      return calculated === checkDigit;
    }

    // プレビュー上にバーコードの読み取り領域と認識ラインを描画（UX・操作性の劇的向上）
    Quagga.onProcessed(function(result) {
      const drawingCtx = Quagga.canvas.ctx.overlay;
      const drawingCanvas = Quagga.canvas.dom.overlay;
      
      if (result) {
        if (result.boxes) {
          drawingCtx.clearRect(0, 0, parseInt(drawingCanvas.getAttribute("width")), parseInt(drawingCanvas.getAttribute("height")));
          result.boxes.filter(function (box) {
            return box !== result.box;
          }).forEach(function (box) {
            Quagga.ImageDebug.drawPath(box, {x: 0, y: 1}, drawingCtx, {color: "green", lineWidth: 2});
          });
        }
        
        if (result.box) {
          Quagga.ImageDebug.drawPath(result.box, {x: 0, y: 1}, drawingCtx, {color: "#0ea5e9", lineWidth: 2});
        }
        
        if (result.codeResult && result.codeResult.code) {
          Quagga.ImageDebug.drawPath(result.line, {x: 'x', y: 'y'}, drawingCtx, {color: "#10b981", lineWidth: 3});
        }
      }
    });

    window.onload = startScan;
  </script>
</body>
</html>
